<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Produto — JM Náutica Store</title>
  <meta name="description" content="Peça náutica original. Atendimento via WhatsApp." />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --deep:  #020c1a;
      --ocean: #051828;
      --mid:   #0a2438;
      --surf:  #0e3050;
      --gold:  #c8a94a;
      --gold2: #e8cc7a;
      --white: #f0f4f8;
      --muted: #5a7a96;
      --green: #25d366;
      --r:     12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Outfit', sans-serif; background: var(--deep); color: var(--white); min-height: 100vh; }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2.5rem;
      background: rgba(2,12,26,0.95); backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(200,169,74,0.1);
    }
    .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.35rem; font-weight: 700; color: var(--gold); text-decoration: none; letter-spacing: 0.06em; }
    .nav-back { display: flex; align-items: center; gap: 7px; color: rgba(240,244,248,0.55); text-decoration: none; font-size: 0.82rem; transition: color 0.2s; }
    .nav-back:hover { color: var(--gold); }

    /* MAIN */
    .page { max-width: 1100px; margin: 0 auto; padding: 3rem 2rem 6rem; }

    /* BREADCRUMB */
    .breadcrumb {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.75rem; color: var(--muted); margin-bottom: 2.5rem;
    }
    .breadcrumb a { color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .breadcrumb a:hover { color: var(--gold); }
    .breadcrumb span { opacity: 0.4; }

    /* GRID PRODUTO */
    .produto-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 3rem; align-items: start;
    }

    /* GALERIA */
    .galeria { position: sticky; top: 80px; }

    .img-principal {
      width: 100%; aspect-ratio: 4/3;
      border-radius: var(--r); overflow: hidden;
      background: var(--mid); border: 1px solid rgba(200,169,74,0.1);
      margin-bottom: 0.8rem; position: relative;
    }
    .img-principal img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.4s ease;
    }
    .img-principal:hover img { transform: scale(1.04); }

    .img-placeholder {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; color: rgba(200,169,74,0.2);
    }
    .img-placeholder svg { width: 60px; height: 60px; }
    .img-placeholder span { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.06em; }

    .img-badge {
      position: absolute; top: 12px; left: 12px;
      background: rgba(2,12,26,0.8); backdrop-filter: blur(8px);
      border: 1px solid rgba(200,169,74,0.25); color: var(--gold2);
      padding: 4px 12px; border-radius: 100px;
      font-size: 0.68rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;
    }

    .thumbnails { display: flex; gap: 0.6rem; flex-wrap: wrap; }
    .thumb {
      width: 70px; height: 70px; border-radius: 8px;
      overflow: hidden; cursor: pointer;
      border: 2px solid transparent; transition: border-color 0.2s;
      background: var(--mid);
    }
    .thumb.active { border-color: var(--gold); }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* DETALHES */
    .detalhes {}

    .det-eyebrow {
      font-size: 0.7rem; font-weight: 500; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--gold);
      margin-bottom: 0.6rem; display: flex; align-items: center; gap: 8px;
    }
    .det-eyebrow::before { content: ''; width: 24px; height: 1px; background: var(--gold); opacity: 0.5; }

    .det-nome {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.6rem, 3vw, 2.4rem); font-weight: 700;
      line-height: 1.15; margin-bottom: 1.2rem;
    }

    .det-preco-wrap { margin-bottom: 1.5rem; }
    .det-preco {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem; font-weight: 700; color: var(--gold);
    }
    .det-preco.consultar {
      font-family: 'Outfit', sans-serif;
      font-size: 0.85rem; font-weight: 400; color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* Info chips */
    .chips { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 1.8rem; }
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      padding: 0.35rem 0.9rem; border-radius: 100px;
      font-size: 0.75rem; color: rgba(240,244,248,0.65);
    }
    .chip.gold { background: rgba(200,169,74,0.08); border-color: rgba(200,169,74,0.2); color: var(--gold2); }
    .chip.green { background: rgba(37,211,102,0.08); border-color: rgba(37,211,102,0.25); color: #5ddb8a; }
    .chip.red   { background: rgba(224,92,92,0.08);  border-color: rgba(224,92,92,0.25);  color: #e05c5c; }

    /* Descrição */
    .det-desc-label {
      font-size: 0.7rem; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 0.6rem;
    }
    .det-desc {
      font-size: 0.9rem; font-weight: 300; color: rgba(240,244,248,0.65);
      line-height: 1.8; margin-bottom: 2rem;
      padding-bottom: 2rem; border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    /* CTA */
    .cta-wrap { display: flex; flex-direction: column; gap: 0.8rem; }

    .btn-wpp {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: var(--green); color: #fff;
      padding: 1rem 2rem; border-radius: var(--r);
      font-family: 'Outfit', sans-serif; font-size: 0.95rem; font-weight: 600;
      text-decoration: none; transition: all 0.25s; letter-spacing: 0.02em;
    }
    .btn-wpp:hover { background: #1fbd5b; transform: translateY(-2px); box-shadow: 0 8px 30px rgba(37,211,102,0.25); }

    .btn-share {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: transparent; border: 1px solid rgba(255,255,255,0.1);
      color: rgba(240,244,248,0.55); padding: 0.75rem;
      border-radius: var(--r); font-family: 'Outfit', sans-serif;
      font-size: 0.82rem; cursor: pointer; transition: all 0.2s;
    }
    .btn-share:hover { border-color: rgba(200,169,74,0.3); color: var(--gold2); }

    /* Cliques */
    .det-clicks {
      margin-top: 1.2rem; display: flex; align-items: center; gap: 6px;
      font-size: 0.75rem; color: var(--muted);
    }

    /* PRODUTOS RELACIONADOS */
    .relacionados { margin-top: 5rem; }
    .rel-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem; font-weight: 700; margin-bottom: 1.5rem;
    }
    .rel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.2rem; }

    .rel-card {
      background: linear-gradient(155deg, rgba(14,48,80,0.7), rgba(5,24,40,0.9));
      border: 1px solid rgba(200,169,74,0.09); border-radius: var(--r);
      overflow: hidden; text-decoration: none; color: var(--white);
      transition: transform 0.25s, border-color 0.25s;
      display: block;
    }
    .rel-card:hover { transform: translateY(-4px); border-color: rgba(200,169,74,0.3); }
    .rel-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; background: var(--mid); }
    .rel-no-img { width: 100%; aspect-ratio: 4/3; background: var(--mid); display: flex; align-items: center; justify-content: center; font-size: 2rem; opacity: 0.2; }
    .rel-body { padding: 0.9rem 1rem 1.1rem; }
    .rel-cat { font-size: 0.65rem; color: var(--gold); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.3rem; }
    .rel-nome { font-size: 0.88rem; font-weight: 500; line-height: 1.4; }

    /* LOADING / ERROR */
    .loading { padding: 6rem 2rem; text-align: center; }
    .loading-spinner {
      width: 40px; height: 40px; border-radius: 50%;
      border: 2px solid rgba(200,169,74,0.2);
      border-top-color: var(--gold);
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { color: var(--muted); font-size: 0.85rem; }

    .error-state { padding: 6rem 2rem; text-align: center; }
    .error-state .icon { font-size: 3rem; opacity: 0.2; margin-bottom: 1rem; }
    .error-state h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; margin-bottom: 0.5rem; }
    .error-state p { color: var(--muted); margin-bottom: 1.5rem; font-size: 0.88rem; }

    .btn-gold {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--gold); color: var(--deep);
      padding: 0.75rem 1.8rem; border-radius: 100px;
      font-weight: 600; font-size: 0.88rem; text-decoration: none; transition: all 0.2s;
    }
    .btn-gold:hover { background: var(--gold2); }

    /* RESPONSIVO */
    @media (max-width: 768px) {
      nav { padding: 0.9rem 1.2rem; }
      .nav-logo { font-size: 1.1rem; }
      .nav-back { font-size: 0.76rem; }

      .page { padding: 1.5rem 1rem 4rem; }
      .breadcrumb { font-size: 0.7rem; margin-bottom: 1.5rem; }

      .produto-grid { grid-template-columns: 1fr; gap: 1.5rem; }
      .galeria { position: static; }
      .img-principal { border-radius: 10px; }
      .thumb { width: 56px; height: 56px; }

      .det-nome { font-size: clamp(1.4rem, 6vw, 2rem); margin-bottom: 0.8rem; }
      .det-preco { font-size: 1.6rem; }
      .chips { gap: 0.4rem; }
      .chip { font-size: 0.7rem; padding: 0.3rem 0.7rem; }

      .det-desc { font-size: 0.84rem; margin-bottom: 1.5rem; padding-bottom: 1.5rem; }

      .btn-wpp { padding: 0.9rem 1.5rem; font-size: 0.88rem; }
      .det-clicks { font-size: 0.7rem; }

      .relacionados { margin-top: 3rem; }
      .rel-title { font-size: 1.3rem; margin-bottom: 1rem; }
      .rel-grid { grid-template-columns: repeat(2, 1fr); gap: 0.8rem; }
      .rel-nome { font-size: 0.8rem; }
    }

    @media (max-width: 400px) {
      .rel-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a class="nav-logo" href="/">⚓ JM Náutica</a>
    <a class="nav-back" href="/#catalogo">← Voltar ao catálogo</a>
  </nav>

  <!-- CONTEÚDO DINÂMICO -->
  <div id="app">
    <div class="loading">
      <div class="loading-spinner"></div>
      <p>Carregando produto...</p>
    </div>
  </div>

  <script>
    let WPP = '5592999999999';
    fetch('/api/config').then(r=>r.json()).then(d=>{ if(d.whatsapp) WPP=d.whatsapp; }).catch(()=>{}); // troque pelo número real
    const API  = '/api';

    // Pega o ID da URL: /produto/5
    const id = window.location.pathname.split('/').pop();

    if (!id || isNaN(id)) {
      mostrarErro('Produto não encontrado.', 'ID inválido na URL.');
    } else {
      carregarProduto(id);
    }

    async function carregarProduto(id) {
      try {
        // Registra clique de visualização e carrega produto em paralelo
        const [res] = await Promise.all([
          fetch(`${API}/produtos/${id}`),
          fetch(`${API}/produtos/${id}/click`, { method: 'POST' }).catch(() => {}),
        ]);

        if (!res.ok) {
          mostrarErro('Produto não encontrado.', 'Este produto pode ter sido removido ou não existe.');
          return;
        }

        const produto = await res.json();

        // Atualiza meta tags
        document.title = `${produto.nome} — JM Náutica Store`;
        document.querySelector('meta[name="description"]').content =
          produto.descricao || `${produto.nome} — Peça náutica original. Consulte via WhatsApp.`;

        renderProduto(produto);
        carregarRelacionados(produto.categoria_slug, produto.id);
      } catch {
        mostrarErro('Erro de conexão.', 'Não foi possível carregar o produto. Tente novamente.');
      }
    }

    function renderProduto(p) {
      const cat    = p.categoria_nome || p.categoria_slug || 'Peça';
      const imagens = Array.isArray(p.imagens) ? p.imagens.filter(Boolean) : [];
      if (p.imagem_principal && !imagens.includes(p.imagem_principal)) {
        imagens.unshift(p.imagem_principal);
      }

      const preco = (p.consultar_preco || !p.preco)
        ? `<div class="det-preco consultar">Entre em contato para saber o preço</div>`
        : `<div class="det-preco">R$ ${Number(p.preco).toLocaleString('pt-BR', {minimumFractionDigits:2})}</div>`;

      const estoque = p.estoque > 0
        ? `<span class="chip green">✓ Disponível (${p.estoque} un.)</span>`
        : `<span class="chip red">✗ Sem estoque</span>`;

      const msg = encodeURIComponent(`Olá! Tenho interesse na peça: *${p.nome}*. Poderia me passar mais informações?`);

      const imgPrincipal = imagens.length > 0
        ? `<img id="img-main" src="${imagens[0]}" alt="${p.nome}" />`
        : `<div class="img-placeholder">
             <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
               <path d="M24 4L28.5 19.5H44L31.5 29.5L36 44L24 34L12 44L16.5 29.5L4 19.5H19.5Z" stroke="#c8a94a" stroke-width="1.4" fill="none"/>
             </svg>
             <span>Sem imagem</span>
           </div>`;

      const thumbs = imagens.length > 1
        ? `<div class="thumbnails">
            ${imagens.map((url, i) => `
              <div class="thumb ${i === 0 ? 'active' : ''}" onclick="trocarImagem('${url}', this)">
                <img src="${url}" alt="Foto ${i+1}" />
              </div>`).join('')}
           </div>`
        : '';

      document.getElementById('app').innerHTML = `
        <div class="page">
          <div class="breadcrumb">
            <a href="/">Início</a>
            <span>/</span>
            <a href="/#catalogo">Catálogo</a>
            <span>/</span>
            <span style="color:var(--white)">${p.nome}</span>
          </div>

          <div class="produto-grid">
            <!-- GALERIA -->
            <div class="galeria">
              <div class="img-principal">
                ${imgPrincipal}
                <div class="img-badge">${cat}</div>
              </div>
              ${thumbs}
            </div>

            <!-- DETALHES -->
            <div class="detalhes">
              <div class="det-eyebrow">${cat}</div>
              <h1 class="det-nome">${p.nome}</h1>

              <div class="det-preco-wrap">${preco}</div>

              <div class="chips">
                ${estoque}
                <span class="chip gold">⚓ Peça náutica</span>
                <span class="chip">📦 Entrega Brasil</span>
              </div>

              ${p.descricao ? `
                <div class="det-desc-label">Descrição</div>
                <div class="det-desc">${p.descricao}</div>
              ` : ''}

              <div class="cta-wrap">
                <a class="btn-wpp"
                  href="https://wa.me/${WPP}?text=${msg}"
                  target="_blank">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.136.561 4.14 1.543 5.876L0 24l6.292-1.519A11.935 11.935 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.794 9.794 0 01-5.006-1.374l-.357-.213-3.737.902.944-3.623-.233-.373A9.797 9.797 0 012.182 12C2.182 6.57 6.57 2.182 12 2.182S21.818 6.57 21.818 12 17.43 21.818 12 21.818z"/></svg>
                  Consultar via WhatsApp
                </a>
                <button class="btn-share" onclick="compartilhar('${p.nome}')">
                  🔗 Copiar link do produto
                </button>
              </div>

              <div class="det-clicks">
                💬 ${p.whatsapp_clicks || 0} pessoas consultaram este produto
              </div>
            </div>
          </div>

          <!-- RELACIONADOS (preenchido depois) -->
          <div class="relacionados" id="relacionados"></div>
        </div>`;
    }

    async function carregarRelacionados(categoriaSlug, idAtual) {
      try {
        const res  = await fetch(`${API}/produtos?categoria=${categoriaSlug}&limite=4`);
        const data = await res.json();
        const itens = (data.dados || []).filter(p => p.id !== parseInt(idAtual)).slice(0, 4);

        if (!itens.length) return;

        document.getElementById('relacionados').innerHTML = `
          <h2 class="rel-title">Peças relacionadas</h2>
          <div class="rel-grid">
            ${itens.map(p => {
              const img = p.imagem_principal
                ? `<img class="rel-img" src="${p.imagem_principal}" alt="${p.nome}" loading="lazy" onerror="this.outerHTML='<div class=rel-no-img>⚙️</div>'" />`
                : `<div class="rel-no-img">⚙️</div>`;
              return `
                <a class="rel-card" href="/produto/${p.id}">
                  ${img}
                  <div class="rel-body">
                    <div class="rel-cat">${p.categoria_nome || p.categoria_slug}</div>
                    <div class="rel-nome">${p.nome}</div>
                  </div>
                </a>`;
            }).join('')}
          </div>`;
      } catch {}
    }

    function trocarImagem(url, thumbEl) {
      const img = document.getElementById('img-main');
      if (img) img.src = url;
      document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
      thumbEl.classList.add('active');
    }

    function compartilhar(nome) {
      const url = window.location.href;
      if (navigator.clipboard) {
        navigator.clipboard.writeText(url).then(() => {
          const btn = document.querySelector('.btn-share');
          btn.textContent = '✅ Link copiado!';
          setTimeout(() => btn.innerHTML = '🔗 Copiar link do produto', 2000);
        });
      }
    }

    function mostrarErro(titulo, msg) {
      document.getElementById('app').innerHTML = `
        <div class="page">
          <div class="error-state">
            <div class="icon">⚓</div>
            <h2>${titulo}</h2>
            <p>${msg}</p>
            <a class="btn-gold" href="/">← Voltar ao catálogo</a>
          </div>
        </div>`;
    }
  </script>
</body>
</html>
