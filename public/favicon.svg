<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fundo circular azul marinho -->
  <circle cx="32" cy="32" r="32" fill="#051828"/>
  
  <!-- Âncora dourada -->
  <!-- Argola no topo -->
  <circle cx="32" cy="14" r="4" fill="none" stroke="#c8a94a" stroke-width="3"/>
  
  <!-- Haste vertical -->
  <line x1="32" y1="18" x2="32" y2="50" stroke="#c8a94a" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Barra horizontal (cepo) -->
  <line x1="20" y1="24" x2="44" y2="24" stroke="#c8a94a" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Parte curva inferior (braços) -->
