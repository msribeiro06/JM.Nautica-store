  <path d="M32 50 Q44 50 46 42" fill="none" stroke="#c8a94a" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Pontas dos braços -->
  <circle cx="18" cy="42" r="2.5" fill="#c8a94a"/>
  <circle cx="46" cy="42" r="2.5" fill="#c8a94a"/>
  
